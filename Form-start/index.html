 <h1>Course Proposal</h1>

<!-- CONTENT HERE -->
<main>
    <h1>Course Proposal Application</h1>
        <form method="get" action="thanks.html">
        <fieldset>
            <legend>Applicant Information</legend>
            <label for="fname">First Name*:</label>
            <input type="text" id="fname" name="fname" required>

            <label for="lname">Last Name*:</label>
            <input type="text" id="lname" name="lname" required>
            
            <label for="email">Email*:</label>
            <input type="email" id="email" name="email" placeholder="your@mail.com" required>
            
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="1234567890">

            <label for="url">Website URL:</label>
            <input type="url" id="url" name="url" placeholder="https://your-website.com">
        </fieldset>

        <fieldset>
            <legend>Course Information</legend>
            <div>Audience</div>
            <input type="radio" id="audience" name="audience" value="beginners">
            <label for="audience1">Beginners</label>
            <input type="radio" id="audience" name="audience" value="intermediate">
            <label for="audience2">Intermediate</label>
            <input type="radio" id="audience" name="audience" value="advanced">
            <label for="audience3">Advanced</label>

            <div>Software Needed</div>
            <label><input type="checkbox" name="editing" value="Yes"> Photo Editing</label>
            <label><input type="checkbox" name="coding" value="Yes"> Coding</label>
            <label><input type="checkbox" name="process" value="Yes"> Preprocessor</label>
            <label><input type="checkbox" name="client" value="Yes"> FTP Client</label>
        </fieldset>

        <fieldset>
            <legend>Funding</legend>
            <label>Anticipated Completion Date:</label>
            <input type="date" name="completion_date">
            <label>Course Subject
                <select name="subject">
                    <option value="">Please Select</option>
                <option value="software">Software Development</option>
                <option value="creative">Professional Development</option>
                <option value="info">Information Technology</option>      
                <option value="data">Data Analysis</option>
                <option value="construction">Construction</option>
                <option value="business">Business</option>
                <option value="security">Cyber Security</option>

                </select>
                
            </label>
        </form>



        

          
        
    </main>
